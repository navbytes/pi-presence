name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint (biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Schema sync
        run: npm run check:schema-sync

      - name: Test
        run: npm test

      - name: Build (bundle the reader CLI)
        run: npm run build

      - name: Audit (production deps)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
