name: release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write

jobs:
  release:
    name: gate + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci

      - name: tag must match pi-presence version
        run: |
          PKG="v$(node -p "require('./packages/pi-presence/package.json').version")"
          if [ "$PKG" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match packages/pi-presence/package.json (${PKG}) — bump the version + CHANGELOG before tagging."
            exit 1
          fi

      - run: npm run check

      - name: build release notes from CHANGELOG
        run: |
          node scripts/changelog-section.mjs "${GITHUB_REF_NAME#v}" > RELEASE_NOTES.md
          echo "----- release notes -----"
          cat RELEASE_NOTES.md

      - name: create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md --latest --verify-tag
