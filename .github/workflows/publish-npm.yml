name: publish-npm

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Pack & validate only (no publish)"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing (no stored NPM_TOKEN)

jobs:
  publish:
    name: publish to npm (trusted publishing)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      # Trusted publishing (OIDC) + provenance require npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: npm run check
      - run: npm run build

      - name: publish
        run: |
          # On a real run, OIDC trusted publishing authenticates automatically
          # (no NPM_TOKEN) and --provenance attaches a provenance statement.
          FLAG="--provenance"
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            FLAG="--dry-run"
            echo "::notice::DRY RUN — packing and validating, nothing will be published"
          fi
          echo "::group::pi-presence (extension)"
          npm publish -w pi-presence --access public $FLAG
          echo "::endgroup::"
          echo "::group::pi-presence-watch (reader CLI)"
          npm publish -w pi-presence-watch --access public $FLAG
          echo "::endgroup::"
